<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crossdem — MTLD Comparison</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 16px;
    color: #1a1a1a;
  }
  h1 {
    font-size: 1.3rem;
    text-align: center;
    margin: 4px 0 20px 0;
  }
  #controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 12px;
    padding: 14px 16px;
    border: 1px solid #e2e2e2;
    border-radius: 8px;
    background: #fafafa;
  }
  #checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px 12px;
  }
  .cb-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    user-select: none;
  }
  .cb-label input { cursor: pointer; }
  .row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .row label { font-size: 0.95rem; font-weight: 600; }
  #doc-slider { flex: 1; min-width: 160px; }
  #doc-count { min-width: 2.5em; display: inline-block; text-align: right; }
  .toggle-group button {
    border: 1px solid #bbb;
    background: #fff;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .toggle-group button:first-child { border-radius: 4px 0 0 4px; }
  .toggle-group button:last-child { border-radius: 0 4px 4px 0; margin-left: -1px; }
  .toggle-group button.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
  #plot { width: 100%; height: 620px; }
  #status { text-align: center; color: #888; padding: 40px 0; }
</style>
</head>
<body>

<h1 id="title">Lexical Diversity (MTLD) Comparison</h1>

<div id="controls">
  <div id="checkbox-grid"></div>

  <div class="row">
    <label for="doc-slider">Docs:</label>
    <input type="range" id="doc-slider" min="1" max="50" value="30">
    <span id="doc-count">30</span>
  </div>

  <div class="row">
    <label>View:</label>
    <div class="toggle-group">
      <button id="btn-bar" class="active">Bar</button>
      <button id="btn-line">Line</button>
    </div>

    <label class="cb-label" style="font-weight:400;">
      <input type="checkbox" id="median-toggle" checked>
      Show medians
    </label>
  </div>
</div>

<div id="plot"></div>
<div id="status" style="display:none;">Select at least one politician.</div>

<script>
const DEFAULT_SELECTED = ["meloni", "degasperi"];
let DATA = null;
let view = "Bar";

// simple seeded PRNG (mulberry32) so sampling is stable across reloads
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function seededSample(arr, n, seed) {
  const rand = mulberry32(seed);
  const copy = arr.slice();
  // Fisher-Yates partial shuffle
  for (let i = copy.length - 1; i > 0 && i >= copy.length - n; i--) {
    const j = Math.floor(rand() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(Math.max(0, copy.length - n));
}

function median(arr) {
  const s = arr.slice().sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 !== 0 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}

function selectedPols() {
  return Array.from(document.querySelectorAll(".pol-cb"))
    .filter(cb => cb.checked)
    .map(cb => cb.dataset.pol);
}

function buildBarTraces(pols, docNum, showMedians) {
  const traces = [];
  const shapes = [];          // NEW
  const n = pols.length;
  const width = 0.8 / n;
  pols.forEach((pol, i) => {
    const entry = DATA[pol];
    const sampleN = Math.min(docNum, entry.mtld.length);
    const sample = seededSample(entry.mtld, sampleN, 42);
    const med = median(entry.mtld);
    const offset = (i - (n - 1) / 2) * width;
    const x = Array.from({length: sampleN}, (_, k) => k + offset);
    traces.push({
      x, y: sample, type: "bar", width,
      name: pol.charAt(0).toUpperCase() + pol.slice(1),
      marker: {color: entry.color, opacity: 0.85},
      legendgroup: pol,
    });
    if (showMedians) {
      shapes.push({                                  // NEW
        type: "line", xref: "paper", x0: 0, x1: 1,    // NEW
        yref: "y", y0: med, y1: med,                  // NEW
        line: {color: entry.color, dash: "dash"},     // NEW
      });                                              // NEW
      traces.push({
        x: [null], y: [null], mode: "lines",
        line: {color: entry.color, dash: "dash"},
        name: `Median (${med.toFixed(2)})`,
        legendgroup: pol, showlegend: true,
      });
    }
  });
  return {traces, shapes};   // CHANGED (was: return traces;)
}

function buildLineTraces(pols, docNum, showMedians) {
  const traces = [];
  const shapes = [];          // NEW
  pols.forEach(pol => {
    const entry = DATA[pol];
    const sampleN = Math.min(docNum, entry.mtld.length);
    const sample = seededSample(entry.mtld, sampleN, 42);
    const med = median(entry.mtld);
    const x = Array.from({length: sampleN}, (_, k) => k);
    traces.push({
      x, y: sample, mode: "lines+markers",
      name: pol.charAt(0).toUpperCase() + pol.slice(1),
      line: {color: entry.color, width: 2.5},
      marker: {color: entry.color, size: 6},
      legendgroup: pol,
    });
    if (showMedians) {
      shapes.push({                                  // NEW
        type: "line", xref: "paper", x0: 0, x1: 1,    // NEW
        yref: "y", y0: med, y1: med,                  // NEW
        line: {color: entry.color, dash: "dash"},     // NEW
      });                                              // NEW
      traces.push({
        x: [null], y: [null], mode: "lines",
        line: {color: entry.color, dash: "dash"},
        name: `Median (${med.toFixed(2)})`,
        legendgroup: pol, showlegend: true,
      });
    }
  });
  return {traces, shapes};   // CHANGED (was: return traces;)
}

function redraw() {
  const pols = selectedPols();
  const docNum = parseInt(document.getElementById("doc-slider").value, 10);
  const showMedians = document.getElementById("median-toggle").checked;
  const plotEl = document.getElementById("plot");
  const statusEl = document.getElementById("status");

  if (pols.length === 0) {
    Plotly.purge(plotEl);
    plotEl.style.display = "none";
    statusEl.style.display = "block";
    return;
  }
  plotEl.style.display = "block";
  statusEl.style.display = "none";

  const {traces, shapes} = view === "Bar"           // CHANGED (was: const traces = ...)
    ? buildBarTraces(pols, docNum, showMedians)
    : buildLineTraces(pols, docNum, showMedians);

  const layout = {
    xaxis: {
      title: "Documents (random samples)",
      tickmode: "array",
      tickvals: Array.from({length: docNum}, (_, k) => k),
      ticktext: Array.from({length: docNum}, (_, k) => `D${k + 1}`),
    },
    yaxis: {title: "MTLD"},
    barmode: view === "Bar" ? "group" : undefined,
    shapes,                                          // NEW
    template: "plotly_white",
    autosize: true,
    height: 600,
    margin: {t: 20},
    legend: {orientation: "h", yanchor: "bottom", y: 1.02, xanchor: "right", x: 1},
  };

  Plotly.react(plotEl, traces, layout, {responsive: true});
}

function buildCheckboxGrid() {
  const grid = document.getElementById("checkbox-grid");
  const pols = Object.keys(DATA);

  const allLabel = document.createElement("label");
  allLabel.className = "cb-label";
  allLabel.style.fontWeight = "700";
  const allCb = document.createElement("input");
  allCb.type = "checkbox";
  allCb.id = "all-cb";
  allLabel.append(allCb, "All");
  grid.appendChild(allLabel);

  const polCbs = [];
  pols.forEach(pol => {
    const label = document.createElement("label");
    label.className = "cb-label";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "pol-cb";
    cb.dataset.pol = pol;
    cb.checked = DEFAULT_SELECTED.includes(pol);
    label.append(cb, pol.charAt(0).toUpperCase() + pol.slice(1));
    grid.appendChild(label);
    polCbs.push(cb);
  });

  let syncing = false;
  allCb.addEventListener("change", () => {
    if (syncing) return;
    syncing = true;
    polCbs.forEach(cb => cb.checked = allCb.checked);
    syncing = false;
    redraw();
  });
  polCbs.forEach(cb => cb.addEventListener("change", () => {
    if (syncing) return;
    syncing = true;
    allCb.checked = polCbs.every(c => c.checked);
    syncing = false;
    redraw();
  }));

  allCb.checked = polCbs.every(c => c.checked);
}

function wireControls() {
  const slider = document.getElementById("doc-slider");
  const docCount = document.getElementById("doc-count");
  //slider.max = Math.max(...Object.values(DATA).map(d => d.mtld.length), 50);
  slider.addEventListener("input", () => {
    docCount.textContent = slider.value;
  });
  slider.addEventListener("change", redraw);

  document.getElementById("btn-bar").addEventListener("click", () => {
    view = "Bar";
    document.getElementById("btn-bar").classList.add("active");
    document.getElementById("btn-line").classList.remove("active");
    document.getElementById("title").textContent = "Lexical Diversity (MTLD) Comparison — Bar";
    redraw();
  });
  document.getElementById("btn-line").addEventListener("click", () => {
    view = "Line";
    document.getElementById("btn-line").classList.add("active");
    document.getElementById("btn-bar").classList.remove("active");
    document.getElementById("title").textContent = "Lexical Diversity (MTLD) Comparison — Line";
    redraw();
  });
  document.getElementById("median-toggle").addEventListener("change", redraw);
}

fetch("data.json")
  .then(r => {
    if (!r.ok) throw new Error("data.json not found");
    return r.json();
  })
  .then(json => {
    DATA = json;
    buildCheckboxGrid();
    wireControls();
    redraw();
  })
  .catch(err => {
    document.getElementById("status").style.display = "block";
    document.getElementById("status").textContent =
      "Couldn't load data.json — make sure it sits next to index.html. (" + err.message + ")";
  });
</script>
</body>
</html>
