<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crossdem — visualizations</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 800px;
    margin: 48px auto;
    padding: 0 16px;
    color: #1a1a1a;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  p.subtitle { color: #666; margin-top: 0; margin-bottom: 32px; }
  #graph-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
a.card {
    display: flex;              /* CHANGED from block */
    align-items: center;        /* NEW */
    gap: 16px;                  /* NEW */
    padding: 16px 20px;
    border: 1px solid #e2e2e2;
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    background: #fafafa;
    transition: border-color 0.15s, background 0.15s;
}
a.card img.thumb {               /* NEW */
    width: 96px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #ddd;
    flex-shrink: 0;
}
a.card .text {                   /* NEW wrapper for title+desc */
    display: flex;
    flex-direction: column;
}
  a.card:hover {
    border-color: #2b6cb0;
    background: #f0f6fc;
  }
  a.card .title {
    font-weight: 600;
    font-size: 1.05rem;
    color: #2b6cb0;
  }
  a.card .desc {
    font-size: 0.9rem;
    color: #555;
    margin-top: 4px;
  }
  #empty {
    color: #888;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Crossdem: Interactive Visualizations</h1>
<p class="subtitle">Interactive graphs from the crossdem project.</p>

<div id="graph-list"></div>

<script>
  // Add one entry here per graph folder (docs/<folder>/index.html + data.json).
  const GRAPHS = [
    {
      folder: "mtld_pms",
      title: "MTLD Prime Ministers Comparison",
      description: "Lexical diversity (MTLD) across Italian Prime Ministers, by document.",
      image: "mtld_pms/mtld_pms.png"
    },
    {
      folder: "mtld_vdem",
      title: "MTLD Political Leaning Against V-Dem",
      description: "Lexical diversity (MTLD) across political spectrums, cross-compared with V-Dem indices.",
      image: "mtld_vdem/mtld_vdem.png"
    },
  ];

  const list = document.getElementById("graph-list");

  if (GRAPHS.length === 0) {
    list.innerHTML = '<p id="empty">No visualizations yet.</p>';
  } else {
    GRAPHS.forEach(g => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = `${g.folder}/`;
        a.innerHTML = `
        ${g.image ? `<img class="thumb" src="${g.image}" alt="${g.title} preview">` : ""}
        <div class="text">
            <div class="title">${g.title}</div>
            <div class="desc">${g.description}</div>
        </div>
        `;
        list.appendChild(a);
    });
  }
</script>
</body>
</html>
