<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTLD by Year and Political Leaning</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
<style>
  :root {
    --border: #d9d9d9;
    --bg: #fafafa;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 24px;
    color: #222;
  }
  h1 {
    font-size: 1.25rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #666;
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 0.9rem;
  }
  .panel {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .panel h3 {
    margin: 0 0 8px 0;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #555;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px 14px;
  }
  .grid.vdem {
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  label.chk {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    align-items: center;
  }
  .toggle-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-group span.label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #444;
  }
  .btn-row {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .btn-row button {
    border: none;
    background: #fff;
    padding: 6px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    border-right: 1px solid var(--border);
  }
  .btn-row button:last-child { border-right: none; }
  .btn-row button.active {
    background: #2c3e50;
    color: #fff;
  }
  .btn-row button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }
  .slider-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }
  .slider-group input[type=range] {
    width: 160px;
  }
  .slider-group input[type=range]:disabled {
    opacity: 0.4;
  }
  #plot {
    width: 100%;
    height: 620px;
  }
  #empty-msg {
    color: #888;
    font-style: italic;
    padding: 40px 0;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<h1>MTLD by Year and Political Leaning</h1>
<p class="subtitle">Lexical diversity (MTLD) of Italian political speeches, 1945–2025, with V-Dem democracy index overlays.</p>

<div class="panel">
  <h3>Political groups</h3>
  <div class="grid" id="group-grid"></div>
</div>

<div class="panel">
  <h3>V-Dem indices (Italy)</h3>
  <div class="grid vdem" id="vdem-grid"></div>
</div>

<div class="panel toggles">
  <div class="toggle-group">
    <span class="label">Stat</span>
    <div class="btn-row" id="stat-toggle"></div>
  </div>
  <div class="toggle-group">
    <span class="label">Mode</span>
    <div class="btn-row" id="mode-toggle"></div>
  </div>
  <div class="toggle-group">
    <span class="label">Chart</span>
    <div class="btn-row" id="chart-toggle"></div>
  </div>
  <div class="slider-group">
    <span class="label">Smoothing</span>
    <input type="range" id="smooth-slider" min="1" max="15" step="1" value="5" disabled>
    <span id="smooth-val">5</span>
  </div>
  <div class="slider-group">
    <span class="label">Trend s</span>
    <input type="range" id="trend-slider" min="0" max="50" step="0.5" value="8" disabled>
    <span id="trend-val">8.0</span>
  </div>
</div>

<div id="plot"></div>
<div id="empty-msg">Select at least one group or V-Dem index.</div>

<script>
const GROUP_COLORS = {
  "Combined": "#7f7f7f",
  "Left (CL/L)": "#d62728",
  "Right (CR/R)": "#1f77b4",
  "Center (C)": "#2ca02c",
};

const VDEM_COLORS = {
  "Electoral democracy": "#9467bd",
  "Liberal democracy": "#8c564b",
  "Participatory democracy": "#e377c2",
  "Elections quality": "#17becf",
  "Fairness of law & individual liberties": "#bcbd22",
  "Scrutiny of Executives": "#ff7f0e",
};

let DATA = null;

const state = {
  groups: new Set(["Combined"]),
  vdem: new Set(),
  stat: "Median",
  mode: "Exact",
  chart: "Line",
  smoothWindow: 5,
  trendS: 8,
};

function nearestFromGrid(value, gridValues) {
  let best = gridValues[0], bestDiff = Infinity;
  for (const v of gridValues) {
    const diff = Math.abs(v - value);
    if (diff < bestDiff) { bestDiff = diff; best = v; }
  }
  return best;
}

function seriesFor(group, stat) {
  if (state.mode === "Smoothed") {
    const w = nearestFromGrid(state.smoothWindow, DATA.smooth_windows);
    return DATA.smoothed[group][stat][String(w)];
  }
  if (state.mode === "Trend") {
    const s = nearestFromGrid(state.trendS, DATA.trend_s_values);
    return DATA.trend[group][stat][s.toFixed(1)];
  }
  return DATA.exact[group][stat];
}

function buildTraces() {
  const traces = [];
  const groups = DATA.groups.filter(g => state.groups.has(g));

  for (const g of groups) {
    const y = seriesFor(g, state.stat);
    if (state.chart === "Bar") {
      traces.push({
        x: DATA.years,
        y: y,
        type: "bar",
        name: g,
        marker: { color: GROUP_COLORS[g] },
      });
    } else {
      const isCurve = state.mode === "Smoothed" || state.mode === "Trend";
      traces.push({
        x: DATA.years,
        y: y,
        type: "scatter",
        mode: isCurve ? "lines" : "lines+markers",
        name: g,
        line: {
          color: GROUP_COLORS[g],
          width: 2.5,
          shape: state.mode === "Smoothed" ? "spline" : "linear",
        },
        marker: { color: GROUP_COLORS[g], size: 5 },
        connectgaps: true,
      });
    }
  }

  const vdemVars = DATA.vdem_vars.filter(v => state.vdem.has(v));
  for (const v of vdemVars) {
    traces.push({
      x: DATA.years,
      y: DATA.vdem[v],
      type: "scatter",
      mode: "lines",
      name: v,
      line: { color: VDEM_COLORS[v], width: 2, dash: "dot" },
      yaxis: "y2",
      connectgaps: true,
    });
  }

  return traces;
}

function redraw() {
  const plotDiv = document.getElementById("plot");
  const emptyMsg = document.getElementById("empty-msg");

  if (state.groups.size === 0 && state.vdem.size === 0) {
    Plotly.purge(plotDiv);
    plotDiv.style.display = "none";
    emptyMsg.style.display = "block";
    return;
  }
  plotDiv.style.display = "block";
  emptyMsg.style.display = "none";

  const traces = buildTraces();

  const layout = {
    xaxis: { title: "Year", range: [DATA.year_min, DATA.year_max], dtick: 5 },
    yaxis: { title: `${state.stat} MTLD` },
    yaxis2: {
      title: "V-Dem index (0–1)",
      overlaying: "y",
      side: "right",
      range: [0, 1],
      showgrid: false,
    },
    template: "plotly_white",
    autosize: true,
    height: 600,
    margin: { t: 40 },
    legend: { orientation: "h", yanchor: "bottom", y: 1.02, xanchor: "right", x: 1 },
    barmode: "group",
  };

  Plotly.react(plotDiv, traces, layout, { responsive: true });
}

// ---------- UI construction ----------
function makeCheckbox(container, key, colorMap, selectedSet, gridClass) {
  const label = document.createElement("label");
  label.className = "chk";

  const swatch = document.createElement("span");
  swatch.className = "swatch";
  if (colorMap) swatch.style.background = colorMap[key];
  else swatch.style.visibility = "hidden";

  const input = document.createElement("input");
  input.type = "checkbox";
  input.checked = selectedSet.has(key);
  input.addEventListener("change", () => {
    if (input.checked) selectedSet.add(key); else selectedSet.delete(key);
    redraw();
  });

  const text = document.createElement("span");
  text.textContent = key;

  label.appendChild(input);
  label.appendChild(swatch);
  label.appendChild(text);
  container.appendChild(label);
}

function makeToggle(containerId, options, current, onChange, disabledCheck) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  const buttons = {};
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = opt === current.value ? "active" : "";
    btn.addEventListener("click", () => {
      if (btn.disabled) return;
      current.value = opt;
      Object.values(buttons).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      onChange(opt);
    });
    buttons[opt] = btn;
    container.appendChild(btn);
  });
  return buttons;
}

function init() {
  const groupGrid = document.getElementById("group-grid");
  DATA.groups.forEach(g => makeCheckbox(groupGrid, g, GROUP_COLORS, state.groups));

  const vdemGrid = document.getElementById("vdem-grid");
  DATA.vdem_vars.forEach(v => makeCheckbox(vdemGrid, v, VDEM_COLORS, state.vdem));

  const statRef = { value: state.stat };
  makeToggle("stat-toggle", DATA.stats, statRef, val => {
    state.stat = val;
    redraw();
  });

  const modeRef = { value: state.mode };
  const smoothSlider = document.getElementById("smooth-slider");
  const trendSlider = document.getElementById("trend-slider");
  const chartRef = { value: state.chart };

  const modeButtons = makeToggle("mode-toggle", ["Exact", "Smoothed", "Trend"], modeRef, val => {
    state.mode = val;
    smoothSlider.disabled = (val !== "Smoothed");
    trendSlider.disabled = (val !== "Trend");
    redraw();
  });

  function setModeLocked(locked) {
    Object.values(modeButtons).forEach(b => b.disabled = locked);
  }

  makeToggle("chart-toggle", ["Line", "Bar"], chartRef, val => {
    state.chart = val;
    if (val === "Bar") {
      if (modeRef.value !== "Exact") {
        modeRef.value = "Exact";
        state.mode = "Exact";
        Object.entries(modeButtons).forEach(([opt, b]) => b.classList.toggle("active", opt === "Exact"));
        smoothSlider.disabled = true;
        trendSlider.disabled = true;
      }
      setModeLocked(true);
    } else {
      setModeLocked(false);
    }
    redraw();
  });

  smoothSlider.addEventListener("input", () => {
    state.smoothWindow = Number(smoothSlider.value);
    document.getElementById("smooth-val").textContent = state.smoothWindow;
    redraw();
  });

  trendSlider.addEventListener("input", () => {
    state.trendS = Number(trendSlider.value);
    document.getElementById("trend-val").textContent = state.trendS.toFixed(1);
    redraw();
  });

  redraw();
}

fetch("data.json")
  .then(r => r.json())
  .then(json => {
    DATA = json;
    init();
  })
  .catch(err => {
    document.getElementById("plot").innerHTML =
      "<p style='color:#c0392b'>Could not load data.json — make sure it sits next to index.html and you're serving this over http(s), not file://.</p>";
    console.error(err);
  });
</script>

</body>
</html>
